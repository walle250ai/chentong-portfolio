        .card-hover:hover {

            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        
        .typing-effect {
            border-right: 2px solid #667eea;
            animation: blink 0.7s infinite;
        }
        
        @keyframes blink {
            0%, 100% { border-color: #667eea; }
            50% { border-color: transparent; }
        }
        
        .scroll-indicator {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .nav-link {
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .project-card {
            position: relative;
            overflow: hidden;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .project-card:hover::before {
            left: 100%;
        }
        
        .skill-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-pulse {
            animation: pulse 2s infinite;
        }

            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }

        const TypingEffect = ({ texts, speed = 100 }) => {
            const [displayText, setDisplayText] = useState('');
            const [textIndex, setTextIndex] = useState(0);
            const [isDeleting, setIsDeleting] = useState(false);
            
            useEffect(() => {
                const currentText = texts[textIndex];
                const timeout = setTimeout(() => {
                    if (!isDeleting) {
                        if (displayText.length < currentText.length) {
                            setDisplayText(currentText.slice(0, displayText.length + 1));
                        } else {
                            setTimeout(() => setIsDeleting(true), 2000);
                        }
                    } else {
                        if (displayText.length > 0) {
                            setDisplayText(currentText.slice(0, displayText.length - 1));
                        } else {
                            setIsDeleting(false);
                            setTextIndex((prev) => (prev + 1) % texts.length);
                        }
                    }
                }, isDeleting ? speed / 2 : speed);
                
                return () => clearTimeout(timeout);
            }, [displayText, isDeleting, textIndex, texts, speed]);
            
            return (
                <span className="typing-effect pr-1">{displayText}</span>
            );
        };

                    <div className="max-w-6xl mx-auto text-center">
                        <p className="text-gray-500 text-sm">
                            {t('footer.copyright').replace('{name}', i18n[language].name)}
                        </p>
                        <p className="text-gray-600 text-xs mt-2">
                            {t('footer.githubLabel')}: <a href="https://github.com/walle250ai" target="_blank" className="text-purple-400 hover:text-purple-300">@walle250ai</a>
                        </p>
                    </div>
                </footer>
            );
        };
        
        // Main App Component
        const App = () => {
            const [loading, setLoading] = useState(true);
            const [language, setLanguage] = useState('zh');
            
            const toggleLanguage = () => {
                setLanguage(prev => prev === 'zh' ? 'en' : 'zh');
            };
            
            const t = (key) => {
                const keys = key.split('.');
                let value = i18n[language];
                for (const k of keys) {
                    if (value && value[k] !== undefined) {
                        value = value[k];
                    } else {
                        return key;
                    }
                }
                return value;
            };
            
            useEffect(() => {
                const timer = setTimeout(() => {
                    setLoading(false);
                }, 1500);
                return () => clearTimeout(timer);
            }, []);
            
            if (loading) {
                return (
                    <div className="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
                        <div className="text-center">
                            <div className="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-white text-lg">{t('loading.title')}</p>
                            <p className="text-gray-500 text-sm mt-2">{t('loading.subtitle')}</p>
                        </div>
                    </div>
                );
            }
            
            return (
                <div>
                    <Navbar language={language} toggleLanguage={toggleLanguage} t={t} />
                    <Hero language={language} t={t} />
                    <About language={language} t={t} />
                    <Skills language={language} t={t} />
                    <Projects language={language} t={t} />
                    <Contact language={language} t={t} />
                    <Footer language={language} t={t} />
                </div>
            );
        };
        
        // Render the app
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
